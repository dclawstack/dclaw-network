apiVersion: v1
kind: Service
metadata:
  name: {{ include "dclaw-network.name" . }}
  labels:
    app.kubernetes.io/name: {{ include "dclaw-network.name" . }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 3044
      name: frontend
    - port: {{ .Values.backend.service.port }}
      targetPort: 8044
      name: backend
  selector:
    app.kubernetes.io/name: {{ include "dclaw-network.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
