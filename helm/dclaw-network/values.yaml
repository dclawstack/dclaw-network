replicaCount: 1

frontend:
  image:
    repository: dclaw-network-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3044
  ingress:
    enabled: false

backend:
  image:
    repository: dclaw-network-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8044
  env:
    NETWORK_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/dclaw_network"

database:
  name: dclaw_network
