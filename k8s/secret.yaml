apiVersion: v1
kind: Secret
metadata:
  name: dclaw-network-secret
  namespace: dclaw-core
  labels:
    app.kubernetes.io/name: dclaw-network
    app.kubernetes.io/part-of: dclaw-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:postgres@dclaw-shared-postgres:5432/dclaw_network"
  APP_ENV: "production"
  SECRET_KEY: "dclaw-network-local-secret-key"
