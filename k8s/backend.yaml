apiVersion: apps/v1
kind: Deployment
metadata:
  name: dclaw-network-backend
  namespace: dclaw-core
  labels:
    app.kubernetes.io/name: dclaw-network-backend
    app.kubernetes.io/part-of: dclaw-platform
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dclaw-network-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dclaw-network-backend
        app.kubernetes.io/part-of: dclaw-platform
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: docker.io/library/dclaw-network-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8044
              name: http
          envFrom:
            - secretRef:
                name: dclaw-network-secret
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dclaw-network-backend
  namespace: dclaw-core
  labels:
    app.kubernetes.io/name: dclaw-network-backend
    app.kubernetes.io/part-of: dclaw-platform
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8044
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: dclaw-network-backend
